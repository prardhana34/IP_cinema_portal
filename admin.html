<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cinema & Film Industry Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Cinema & Film Industry Portal - Admin</h1>
    </header>
    
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="movies.html">Movies</a></li>
            
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="admin.html">Admin</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
    
    <main>
        <h2>Admin Panel</h2>
        
        <section class="admin-section">
            <h3 id="form-title">Add Movie</h3>
            <form id="add-movie-form">
                <div>
                    <label for="movie-title">Title:</label>
                    <input type="text" id="movie-title" required>
                </div>
                <div>
                    <label for="movie-genre">Genre:</label>
                    <input type="text" id="movie-genre" required>
                </div>
                <div>
                    <label for="movie-year">Release Year:</label>
                    <input type="number" id="movie-year" required>
                </div>
                <div>
                    <label for="movie-director">Director:</label>
                    <input type="text" id="movie-director" required>
                </div>
                <div>
                    <label for="movie-description">Description:</label>
                    <textarea id="movie-description" required></textarea>
                </div>
                <div>
                    <label for="movie-rating">Rating:</label>
                    <input type="number" id="movie-rating" step="0.1" min="0" max="10" required>
                </div>
                <div>
                    <label for="movie-poster">Poster URL:</label>
                    <input type="text" id="movie-poster" required>
                </div>
                <div>
                    <label for="movie-platforms">Platforms (comma-separated):</label>
                    <input type="text" id="movie-platforms" placeholder="e.g., Netflix, Amazon Prime Video">
                </div>
                <button type="submit" id="submit-btn" class="btn">Add Movie</button>
            </form>
        </section>
        
        <section class="admin-section">
            <h3>Manage Movies</h3>
            <table id="admin-movies-table" class="table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Genre</th>
                        <th>Year</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Movies will be loaded here by JavaScript -->
                </tbody>
            </table>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2023 Cinema & Film Industry Portal</p>
    </footer>
    
    <script src="js/script.js?v=4"></script>
</body>
</html>
